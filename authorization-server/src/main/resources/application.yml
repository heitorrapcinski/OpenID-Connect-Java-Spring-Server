server:
  port: 8080

spring:
  application:
    name: authorization-server
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/auth_db}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

client:
  registry:
    url: ${CLIENT_REGISTRY_URL:http://localhost:8081}

scope:
  manager:
    url: ${SCOPE_MANAGER_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
