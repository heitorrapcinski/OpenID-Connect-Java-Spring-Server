server:
  port: 8084

spring:
  application:
    name: scope-manager
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/scope_db}
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:changeme}
      roles: ADMIN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
