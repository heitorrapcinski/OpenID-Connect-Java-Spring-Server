server:
  port: 8081
  base-url: ${SERVER_BASE_URL:http://localhost:8081}

spring:
  application:
    name: client-registry
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/client_db}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:changeme}
      roles: ADMIN

scope:
  manager:
    url: ${SCOPE_MANAGER_URL:http://localhost:8084}

resilience4j:
  circuitbreaker:
    instances:
      scope-manager:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
  retry:
    instances:
      scope-manager:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      scope-manager:
        timeout-duration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: true
    kafka:
      enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: ${spring.application.name}
    version: @project.version@

logging:
  config: classpath:logback-spring.xml
